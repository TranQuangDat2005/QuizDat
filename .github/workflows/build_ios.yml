name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS Unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        working-directory: Front-end/QuizDat
        run: flutter pub get

      - name: Build iOS App (No Codesign)
        working-directory: Front-end/QuizDat
        run: |
          flutter build ios --release --no-codesign

          # Package Runner.app into unsigned .ipa for LiveContainer
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -qq -r QuizDat.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuizDat-iOS-IPA
          path: Front-end/QuizDat/build/ios/iphoneos/QuizDat.ipa
          retention-days: 7
