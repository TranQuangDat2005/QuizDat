name: Build Flutter APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:  # Cho phép chạy thủ công từ GitHub UI

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java (required for Android build)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      # 4. Get dependencies
      - name: Install dependencies
        run: flutter pub get

      # 5. Build APK (release, split per ABI for smaller size)
      - name: Build APK
        run: flutter build apk --release --split-per-abi

      # 6. Upload APKs as artifact
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quizdat-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      # 7. Create GitHub Release on push to main (optional, runs only on push)
      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "QuizDat Build #${{ github.run_number }}"
          body: |
            Automatic build from commit ${{ github.sha }}
            
            **Thay đổi:**
            ${{ github.event.head_commit.message }}
          files: build/app/outputs/flutter-apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
